<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RenderScope — Three.js Demo Scene</title>
  <meta name="description" content="Demo Three.js scene for testing the RenderScope Chrome DevTools extension.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050507;
      color: #e2e8f0;
      overflow: hidden;
    }

    canvas { display: block; }

    #ui-overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 280px;
    }

    .ui-card {
      background: rgba(15, 17, 23, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .ui-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #818cf8;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .ui-title svg { width: 16px; height: 16px; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #8892a4;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #e2e8f0;
      font-weight: 600;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    button {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 7px;
      color: #818cf8;
      font-size: 11px;
      font-weight: 600;
      padding: 7px 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    button:hover {
      background: rgba(99,102,241,0.28);
      border-color: rgba(99,102,241,0.5);
      color: #a5b4fc;
    }

    button.danger {
      background: rgba(248,113,113,0.1);
      border-color: rgba(248,113,113,0.25);
      color: #f87171;
    }

    button.danger:hover {
      background: rgba(248,113,113,0.2);
    }

    .hint {
      font-size: 10.5px;
      color: #4a5568;
      text-align: center;
      line-height: 1.5;
    }

    #fps-display {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #4ade80;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 8px;
      padding: 6px 12px;
    }

    a {
      color: #818cf8;
      font-size: 10.5px;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }
  </style>
  <!-- Three.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
</head>
<body>

<div id="ui-overlay">
  <div class="ui-card">
    <div class="ui-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5" stroke-linejoin="round"/>
        <path d="M2 12l10 5 10-5" stroke-linejoin="round"/>
      </svg>
      RenderScope Demo
    </div>
    <div class="stat-row"><span>Objects</span><span class="stat-val" id="s-objects">0</span></div>
    <div class="stat-row"><span>Materials</span><span class="stat-val" id="s-mats">0</span></div>
    <div class="stat-row"><span>Lights</span><span class="stat-val" id="s-lights">0</span></div>
    <div class="stat-row"><span>Shadows</span><span class="stat-val" id="s-shadows">—</span></div>
  </div>

  <div class="ui-card">
    <div class="ui-title" style="margin-bottom:8px; font-size:12px; color:#8892a4;">Scene Controls</div>
    <div class="controls-grid">
      <button onclick="addMeshBurst()">+ Add 50 meshes</button>
      <button onclick="addInstanced()">+ Instanced ×500</button>
      <button onclick="toggleShadows()">Toggle Shadows</button>
      <button onclick="addExpensiveMat()">+ Complex Shader</button>
      <button onclick="addLODObject()">+ LOD Object</button>
      <button class="danger" onclick="clearScene()">Clear Scene</button>
    </div>
  </div>

  <div class="ui-card">
    <p class="hint">
      Open Chrome DevTools → <b>RenderScope</b> tab<br>
      to see live performance analysis.<br><br>
      <a href="https://developer.chrome.com/docs/extensions/mv3/getstarted/" target="_blank">Load Extension Guide ↗</a>
    </p>
  </div>
</div>

<div id="fps-display">60.0 FPS</div>

<script>
// ─── Scene Setup ─────────────────────────────────────────────────────────────

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

camera.position.set(0, 15, 30);
camera.lookAt(0, 0, 0);

scene.background = new THREE.Color(0x050507);
scene.fog = new THREE.FogExp2(0x050507, 0.025);

// ─── Lights ───────────────────────────────────────────────────────────────────

const ambientLight = new THREE.AmbientLight(0x2a2a4a, 2);
ambientLight.name = 'Ambient Light';
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 3);
dirLight.name = 'Sun';
dirLight.position.set(20, 30, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width  = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near   = 0.5;
dirLight.shadow.camera.far    = 100;
dirLight.shadow.camera.left   = -30;
dirLight.shadow.camera.right  =  30;
dirLight.shadow.camera.top    =  30;
dirLight.shadow.camera.bottom = -30;
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0x6366f1, 80, 30);
pointLight1.name = 'Accent Light A';
pointLight1.position.set(-10, 5, 5);
pointLight1.castShadow = false;
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xf87171, 50, 20);
pointLight2.name = 'Accent Light B';
pointLight2.position.set(10, 5, -5);
pointLight2.castShadow = false;
scene.add(pointLight2);

// ─── Ground ───────────────────────────────────────────────────────────────────

const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0a0b10,
  roughness: 0.9,
  metalness: 0.1,
});
groundMat.name = 'Ground Material';

const ground = new THREE.Mesh(groundGeo, groundMat);
ground.name = 'Ground';
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Initial Geometry ─────────────────────────────────────────────────────────

// A grid of standard cubes
const baseGeo = new THREE.BoxGeometry(1, 1, 1);
const colors = [0x6366f1, 0x818cf8, 0x4ade80, 0xf87171, 0xfacc15, 0x60a5fa];

for (let i = 0; i < 25; i++) {
  const mat = new THREE.MeshStandardMaterial({
    color: colors[i % colors.length],
    roughness: 0.2 + Math.random() * 0.6,
    metalness: Math.random() * 0.8,
  });
  mat.name = `Cube Material ${i}`;

  const mesh = new THREE.Mesh(baseGeo, mat);
  mesh.name = `Cube_${String(i).padStart(2, '0')}`;
  mesh.position.set(
    (Math.random() - 0.5) * 20,
    0.5 + Math.random() * 3,
    (Math.random() - 0.5) * 20
  );
  mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
  mesh.scale.setScalar(0.5 + Math.random() * 1.5);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
}

// A torus knot (higher poly, interesting shader)
const knotGeo = new THREE.TorusKnotGeometry(3, 0.8, 128, 32);
const knotMat = new THREE.MeshStandardMaterial({
  color: 0xc084fc,
  roughness: 0.05,
  metalness: 0.95,
  envMapIntensity: 1,
});
knotMat.name = 'Knot Material';

const knot = new THREE.Mesh(knotGeo, knotMat);
knot.name = 'TorusKnot_Hero';
knot.position.set(0, 4, 0);
knot.castShadow = true;
scene.add(knot);

// ─── Scene Controls ───────────────────────────────────────────────────────────

let shadowsEnabled = true;

function addMeshBurst() {
  const geo = new THREE.IcosahedronGeometry(0.5, 1);
  for (let i = 0; i < 50; i++) {
    const mat = new THREE.MeshStandardMaterial({
      color: Math.random() * 0xffffff,
      roughness: Math.random(),
      metalness: Math.random() * 0.5,
    });
    mat.name = `BurstMat_${Date.now()}_${i}`;

    const mesh = new THREE.Mesh(geo, mat);
    mesh.name = `BurstMesh_${Date.now()}_${i}`;
    mesh.position.set(
      (Math.random() - 0.5) * 30,
      Math.random() * 5,
      (Math.random() - 0.5) * 30
    );
    mesh.castShadow = true;
    scene.add(mesh);
  }
  updateStats();
}

function addInstanced() {
  const geo = new THREE.SphereGeometry(0.3, 8, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0x4ade80, roughness: 0.3, metalness: 0.7 });
  mat.name = 'InstancedSphere Material';

  const count = 500;
  const mesh = new THREE.InstancedMesh(geo, mat, count);
  mesh.name = 'InstancedSpheres_500';

  const dummy = new THREE.Object3D();
  for (let i = 0; i < count; i++) {
    dummy.position.set(
      (Math.random() - 0.5) * 40,
      Math.random() * 6,
      (Math.random() - 0.5) * 40
    );
    dummy.scale.setScalar(0.5 + Math.random() * 1.5);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  mesh.instanceMatrix.needsUpdate = true;
  scene.add(mesh);
  updateStats();
}

function addExpensiveMat() {
  // Custom ShaderMaterial with multiple texture lookups and conditionals
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 },
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float time;
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;

      // A deliberately complex fragment shader for testing
      float pattern(vec2 uv, float t) {
        float v = 0.0;
        for (int i = 0; i < 5; i++) {
          float fi = float(i);
          v += sin(uv.x * (2.0 + fi) + t) * cos(uv.y * (3.0 + fi) - t * 0.5);
        }
        return v / 5.0;
      }

      void main() {
        vec3 light = normalize(vec3(1.0, 2.0, 1.0));
        float diff = max(dot(vNormal, light), 0.0);

        float p1 = pattern(vUv, time * 0.5);
        float p2 = pattern(vUv * 2.0 + 0.3, time * 0.3);

        vec3 col = mix(vec3(0.4, 0.2, 0.8), vec3(0.1, 0.8, 0.6), p1 * 0.5 + 0.5);
        col = mix(col, vec3(0.9, 0.3, 0.2), p2 * 0.3 + 0.3);

        if (p1 > 0.5) {
          col *= 1.3;
        } else if (p1 < -0.5) {
          col *= 0.7;
        }

        col *= diff * 0.8 + 0.3;

        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
  mat.name = 'ComplexShader_SpiralNoise';

  const geo = new THREE.TorusGeometry(2, 0.6, 32, 64);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.name = 'ComplexShaderTorus';
  mesh.position.set(8, 3, -5);
  mesh.castShadow = false;
  scene.add(mesh);

  // Store for time uniform update
  complexMaterials.push(mat);
  updateStats();
}

const complexMaterials = [];

function addLODObject() {
  const lod = new THREE.LOD();
  lod.name = 'LOD_Sphere';

  const levels = [
    { geo: new THREE.SphereGeometry(2, 32, 32), dist: 0   },
    { geo: new THREE.SphereGeometry(2, 16, 16), dist: 10  },
    { geo: new THREE.SphereGeometry(2, 8,  8 ), dist: 20  },
    { geo: new THREE.SphereGeometry(2, 4,  4 ), dist: 40  },
  ];

  for (const { geo, dist } of levels) {
    const mat = new THREE.MeshStandardMaterial({ color: 0xfacc15, roughness: 0.4, metalness: 0.6 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    lod.addLevel(mesh, dist);
  }

  lod.position.set(-10, 2, -8);
  scene.add(lod);
  updateStats();
}

function toggleShadows() {
  shadowsEnabled = !shadowsEnabled;
  dirLight.castShadow = shadowsEnabled;
  scene.traverse(obj => {
    if (obj.isMesh) {
      obj.castShadow    = shadowsEnabled;
      obj.receiveShadow = shadowsEnabled;
    }
  });
  document.querySelector('#s-shadows').textContent = shadowsEnabled ? 'On' : 'Off';
}

function clearScene() {
  const toRemove = [];
  scene.traverse(obj => {
    if (obj.isMesh || obj.isInstancedMesh || obj.isLOD) {
      if (obj !== ground && obj !== knot) toRemove.push(obj);
    }
  });
  for (const obj of toRemove) {
    scene.remove(obj);
    obj.geometry?.dispose();
    if (Array.isArray(obj.material)) {
      obj.material.forEach(m => m.dispose());
    } else {
      obj.material?.dispose();
    }
  }
  complexMaterials.length = 0;
  updateStats();
}

function updateStats() {
  let objectCount = 0;
  let matCount = 0;
  let lightCount = 0;
  let shadowCount = 0;
  const seenMats = new Set();

  scene.traverse(obj => {
    if (obj.isMesh || obj.isInstancedMesh) {
      objectCount++;
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      for (const m of mats) { if (m && !seenMats.has(m.uuid)) { seenMats.add(m.uuid); matCount++; } }
    }
    if (obj.isLight) {
      lightCount++;
      if (obj.castShadow) shadowCount++;
    }
  });

  document.getElementById('s-objects').textContent = objectCount;
  document.getElementById('s-mats').textContent    = matCount;
  document.getElementById('s-lights').textContent  = lightCount;
  document.getElementById('s-shadows').textContent = shadowCount;
}

// ─── Animation Loop ───────────────────────────────────────────────────────────

let lastTime = performance.now();
let frames = 0;
let fpsAcc = 0;

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const delta = (now - lastTime) / 1000;
  lastTime = now;
  frames++;
  fpsAcc += 1 / delta;

  if (frames % 30 === 0) {
    const fps = fpsAcc / 30;
    document.getElementById('fps-display').textContent = `${fps.toFixed(1)} FPS`;
    fpsAcc = 0;
  }

  // Rotate hero knot
  const t = now * 0.001;
  knot.rotation.x = t * 0.3;
  knot.rotation.y = t * 0.5;

  // Update complex shader uniforms
  for (const mat of complexMaterials) {
    if (mat.uniforms?.time) mat.uniforms.time.value = t;
  }

  // Animate point lights
  pointLight1.position.x = Math.sin(t * 0.7) * 12;
  pointLight1.position.z = Math.cos(t * 0.7) * 12;
  pointLight2.position.x = Math.sin(t * 0.5 + Math.PI) * 10;
  pointLight2.position.z = Math.cos(t * 0.5) * 10;

  // Gentle camera orbit
  camera.position.x = Math.sin(t * 0.1) * 28;
  camera.position.z = Math.cos(t * 0.1) * 28;
  camera.lookAt(0, 2, 0);

  renderer.render(scene, camera);
}

// ─── Resize ───────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Init ─────────────────────────────────────────────────────────────────────

updateStats();
animate();
</script>
</body>
</html>
